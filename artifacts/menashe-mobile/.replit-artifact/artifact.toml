kind = "mobile"
previewPath = "/mobile/"
title = "Menashe Calendar Mobile"
version = "1.0.0"
id = "artifacts/menashe-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25726

[services.development]
run = "pnpm --filter @workspace/menashe-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/menashe-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/menashe-mobile", "run", "serve" ]

[services.env]
PORT = "25726"
BASE_PATH = "/mobile/"
